name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 requests

      - name: Download mpv DLLs
        run: |
          python download_mpv_dll.py

      - name: Build with PyInstaller
        run: |
          pyinstaller K20_IPTV_Player.spec --clean

      - name: Compress Release Archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/K20_IPTV_Player.exe -DestinationPath dist/K20_IPTV_Player.zip

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/K20_IPTV_Player.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

